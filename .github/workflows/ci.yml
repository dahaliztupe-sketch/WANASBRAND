name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Lint
      run: npm run lint

    - name: TypeScript Check
      run: npx tsc --noEmit

    # - name: Run Unit Tests
    #   run: npm run test

    - name: Build Project
      run: npm run build
      env:
        # Provide dummy env vars for build if necessary
        NEXT_PUBLIC_FIREBASE_API_KEY: "dummy"
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: "dummy"
