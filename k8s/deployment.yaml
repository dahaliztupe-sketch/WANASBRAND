apiVersion: apps/v1
kind: Deployment
metadata:
  name: wanas-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: wanas-web
  template:
    metadata:
      labels:
        app: wanas-web
    spec:
      containers:
      - name: wanas-web
        image: gcr.io/wanas-project/web:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        envFrom:
        - secretRef:
            name: wanas-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: wanas-service
spec:
  selector:
    app: wanas-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
---
apiVersion: networking.k8s.io/1.1
kind: Ingress
metadata:
  name: wanas-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - wanasbrand.com
    secretName: wanas-tls
  rules:
  - host: wanasbrand.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wanas-service
            port:
              number: 80
